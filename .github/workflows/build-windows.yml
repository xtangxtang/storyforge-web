name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build web renderer
        run: npx vite build

      - name: Remove crossorigin attr (fix ES module loading in Electron file://)
        run: (Get-Content dist/index.html -Raw) -replace '\s+crossorigin(="[^"]*")?', '' | Set-Content dist/index.html -Encoding UTF8 -NoNewline

      - name: Build Electron main process
        run: npx vite build --config vite.electron.config.ts

      - name: Build NSIS installer
        run: npx electron-builder --win --publish=never

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Storyforge-Setup
          path: release/*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
